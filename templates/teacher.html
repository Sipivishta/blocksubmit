<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #000000, #111111, #1a1a1a, #000000);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow:
                0 0 6px rgba(255,255,255,0.6),
                0 0 12px rgba(0,255,255,0.3);
        }

        .logout-btn {
            background: #ff4d4d;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff1a1a;
        }

        /* MAIN */
        .container {
            padding: 40px 70px;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 30px;
        }

        /* DROPDOWN */
        select {
            padding: 12px;
            border-radius: 10px;
            background: #111;
            color: white;
            border: none;
            margin-bottom: 25px;
        }

        /* GRID */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 18px;
            width: 300px;

            backdrop-filter: blur(15px);
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card p {
            margin: 6px 0;
        }

        .hash {
            font-size: 11px;
            color: #94a3b8;
            word-break: break-all;
        }

        /* VERIFY BOX */
        .verify-box {
            margin-top: 50px;
            max-width: 420px;
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 18px;

            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .verify-box h3 {
            margin-bottom: 10px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
        }

        input {
            background: #e2e8f0;
            color: black;
        }

        button {
            background: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ddd;
            transform: scale(1.02);
        }

        #result {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">BLOCKSUBMIT</div>

    <a href="/logout">
        <button class="logout-btn">Logout</button>
    </a>
</div>

<div class="container">

    <h2>👨‍🏫 Teacher Dashboard</h2>

    <!-- COURSE FILTER -->
    <form method="POST">
        <select name="course_id" onchange="this.form.submit()">
            <option value="">All Courses</option>
            {% for c in courses %}
                <option value="{{ c }}" {% if selected_course == c %}selected{% endif %}>
                    {{ c }}
                </option>
            {% endfor %}
        </select>
    </form>

    <!-- BLOCKCHAIN -->
    <div class="grid">
        {% for block in chain %}
        <div class="card">
            <p><b>Student:</b> {{ block.student_id }}</p>
            <p><b>Course:</b> {{ block.course_id }}</p>
            <p><b>Version:</b> {{ block.version }}</p>
            <p><b>Time:</b> {{ block.timestamp }}</p>

            <p class="hash">
                <b>Hash:</b><br>{{ block.file_hash }}
            </p>
        </div>
        {% endfor %}
    </div>

    <!-- VERIFY -->
    <div class="verify-box">
        <h3>🔍 Verify Submission</h3>

        <form id="verifyForm">

            <input type="text" name="student_id" placeholder="Student ID" required>

            <select name="course_id" required>
                {% for c in courses %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>

            <input type="file" name="file" required>

            <button type="submit">Verify File</button>
        </form>

        <p id="result"></p>
    </div>

</div>

<script>
document.getElementById("verifyForm").onsubmit = async function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    let res = await fetch("/verify", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    let result = document.getElementById("result");

    result.innerHTML = data.message;

    if (data.status === "original") result.style.color = "#4ade80";
    else if (data.status === "updated") result.style.color = "#facc15";
    else result.style.color = "#f87171";
};
</script>

</body>
</html>
