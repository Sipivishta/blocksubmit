<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #000000, #111111, #1a1a1a, #000000);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow:
                0 0 6px rgba(255,255,255,0.7),
                0 0 12px rgba(0,255,255,0.3);
        }

        .logout-btn {
            background: #ff4d4d;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* 🔥 MAIN CENTER FIX */
        .container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;     /* center horizontally */
            justify-content: center; /* center vertically */
        }

        h2 {
            margin-bottom: 30px;
            font-size: 30px;
        }

        /* 🔥 CENTERED DASHBOARD */
        .dashboard {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        /* BOX */
        .box {
            width: 380px;

            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;

            backdrop-filter: blur(20px);
            box-shadow: 0 0 35px rgba(0,0,0,0.9);

            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .box h3 {
            margin-bottom: 15px;
        }

        /* INPUTS */
        input, select, button {
            width: 100%;
            padding: 13px;
            margin: 12px 0;
            border-radius: 10px;
            border: none;
        }

        input {
            background: #e2e8f0;
            color: black;
        }

        select {
            background: #111;
            color: white;
        }

        button {
            background: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ddd;
            transform: scale(1.03);
        }

        .msg {
            margin-top: 10px;
            font-weight: bold;
        }

        #result {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

        /* 🔥 MOBILE FIX */
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">BLOCKSUBMIT</div>

    <a href="/logout">
        <button class="logout-btn">Logout</button>
    </a>
</div>

<!-- MAIN -->
<div class="container">

    <h2>🎓 Student Dashboard</h2>

    <div class="dashboard">

        <!-- 📂 UPLOAD -->
        <div class="box">
            <h3>📂 Upload Assignment</h3>

            <form method="POST" enctype="multipart/form-data">

                <select name="course_id" required>
                    {% for c in session["courses"] %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>

                <input type="file" name="file" required>

                <button type="submit">Upload File</button>
            </form>

            <p class="msg">{{ msg }}</p>
        </div>

        <!-- 🔍 VERIFY -->
        <div class="box">
            <h3>🔍 Verify My Submission</h3>

            <form id="verifyForm">

                <select name="course_id" required>
                    {% for c in session["courses"] %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>

                <input type="file" name="file" required>

                <button type="submit">Verify File</button>
            </form>

            <p id="result"></p>
        </div>

    </div>

</div>

<!-- SCRIPT -->
<script>
document.getElementById("verifyForm").onsubmit = async function(e) {
    e.preventDefault();

    let formData = new FormData(this);
    formData.append("student_id", "{{ session['user'] }}");

    let res = await fetch("/verify", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    let result = document.getElementById("result");

    result.innerHTML = data.message;

    if (data.status === "original") result.style.color = "#4ade80";
    else if (data.status === "updated") result.style.color = "#facc15";
    else result.style.color = "#f87171";
};
</script>

</body>
</html>
