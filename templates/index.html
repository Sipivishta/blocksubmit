<!DOCTYPE html>
<html>
<head>
    <title>Assignment Blockchain System</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #38bdf8;
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

<h1>📦 Assignment Blockchain System</h1>

<div class="container">

    <!-- Upload Card -->
    <div class="card">
        <h2>Upload Assignment</h2>
        <form action="http://127.0.0.1:5000/upload" method="post" enctype="multipart/form-data">
            <input type="text" name="student_id" placeholder="Student ID" required>
            <input type="text" name="course_id" placeholder="Course ID" required>
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>
    </div>

    <!-- Verify Card -->
    <div class="card">
        <h2>Verify Assignment</h2>
        <form action="http://127.0.0.1:5000/verify" method="post" enctype="multipart/form-data">
            <input type="text" name="student_id" placeholder="Student ID" required>
            <input type="file" name="file" required>
            <button type="submit">Verify</button>
        </form>
    </div>

</div>

</body>
</html>
