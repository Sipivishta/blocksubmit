<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #000000, #111111, #1a1a1a, #000000);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .logout-btn {
            background: #ff4d4d;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .logout-btn:hover {
            background: #e63946;
        }

        /* MAIN */
        .main {
            padding: 30px 60px;
        }

        .title {
            font-size: 32px;
            margin-bottom: 30px;
        }

        /* GRID */
        .grid {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 350px;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h3 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #e2e8f0;
            color: black;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-btn {
            background: white;
            color: black;
        }

        .upload-btn:hover {
            background: #ddd;
        }

        .verify-btn {
            background: #0ea5e9;
            color: white;
        }

        .verify-btn:hover {
            background: #0284c7;
        }

        .msg {
            text-align: center;
            margin-top: 10px;
        }

        #result {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">BLOCKSUBMIT</div>

    <a href="/logout">
        <button class="logout-btn">Logout</button>
    </a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="title">🎓 Student Dashboard</div>

    <div class="grid">

        <!-- UPLOAD CARD -->
        <div class="card">
            <h3>📤 Upload Assignment</h3>

            <form method="POST" enctype="multipart/form-data">
                <input type="text" name="student_id" placeholder="Student ID" required>
                <input type="text" name="course_id" placeholder="Course ID" required>
                <input type="file" name="file" required>

                <button class="upload-btn" type="submit">
                    Upload Assignment
                </button>
            </form>

            {% if msg %}
                <p class="msg">{{ msg }}</p>
            {% endif %}
        </div>

        <!-- VERIFY CARD -->
        <div class="card">
            <h3>🔍 Verify File Integrity</h3>

            <form id="verifyForm">
                <input type="file" name="file" required>

                <button class="verify-btn" type="submit">
                    Verify File
                </button>
            </form>

            <p id="result"></p>
        </div>

    </div>

</div>

<script>
document.getElementById("verifyForm").onsubmit = async function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    let res = await fetch("/verify", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    let result = document.getElementById("result");

    if (data.status === "original") {
        result.innerHTML = "✅ ORIGINAL FILE";
        result.style.color = "#4ade80";
    } else {
        result.innerHTML = "❌ TAMPERED FILE";
        result.style.color = "#f87171";
    }
};
</script>

</body>
</html>
