<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BlockSubmit Signup</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    color: white;
    overflow: hidden;
    position: relative;

    background: linear-gradient(-45deg, #000000, #111111, #1a1a1a, #000000);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
}

/* GRID BACKGROUND */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🌌 BACKGROUND WORDS */
.bg-elements {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
}

.bg-elements span {
    position: absolute;
    color: rgba(0,255,255,0.25);
    font-weight: bold;

    text-shadow:
        0 0 8px rgba(0,255,255,0.4),
        0 0 20px rgba(0,255,255,0.2);

    animation: float 10s ease-in-out infinite alternate;
}

/* size variation */
.bg-elements span:nth-child(odd){ font-size: 22px; }
.bg-elements span:nth-child(even){ font-size: 30px; }

/* positions */
.bg-elements span:nth-child(1){ top:10%; left:20%;}
.bg-elements span:nth-child(2){ top:30%; left:70%;}
.bg-elements span:nth-child(3){ top:60%; left:10%;}
.bg-elements span:nth-child(4){ top:80%; left:50%;}
.bg-elements span:nth-child(5){ top:20%; left:40%;}
.bg-elements span:nth-child(6){ top:50%; left:80%;}
.bg-elements span:nth-child(7){ top:75%; left:25%;}
.bg-elements span:nth-child(8){ top:40%; left:60%;}
.bg-elements span:nth-child(9){ top:15%; left:75%;}
.bg-elements span:nth-child(10){ top:65%; left:55%;}
.bg-elements span:nth-child(11){ top:85%; left:15%;}
.bg-elements span:nth-child(12){ top:25%; left:85%;}
.bg-elements span:nth-child(13){ top:55%; left:35%;}
.bg-elements span:nth-child(14){ top:5%; left:50%;}
.bg-elements span:nth-child(15){ top:45%; left:5%;}
.bg-elements span:nth-child(16){ top:70%; left:90%;}

@keyframes float {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-30px); }
}

/* HEADER */
.header {
    position: relative;
    z-index: 2;
    padding: 20px 50px;
}

.logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 3px;
}

/* FORM */
.container {
    height: calc(100vh - 80px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
    position: relative;
}

.card {
    position: relative;
    background: rgba(255,255,255,0.05);
    padding: 45px;
    border-radius: 25px;
    width: 360px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 50px rgba(0,0,0,0.9);
    text-align: center;
}

/* glow border */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: linear-gradient(45deg, #00ffff, #4ade80);
    filter: blur(20px);
    opacity: 0.3;
    z-index: -1;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #e2e8f0;
    color: black;
}

input:focus {
    outline: none;
    box-shadow: 0 0 10px cyan;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    background: white;
    border-radius: 10px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.msg {
    color: red;
}
</style>
</head>

<body>

<div class="bg-elements">
    <span>hash</span>
    <span>block</span>
    <span>node</span>
    <span>verify</span>
    <span>ledger</span>
    <span>transaction</span>
    <span>secure</span>
    <span>timestamp</span>
    <span>course_id</span>
    <span>student_id</span>
    <span>upload</span>
    <span>version</span>
    <span>chain</span>
    <span>integrity</span>
    <span>auth</span>
    <span>validation</span>
</div>

<div class="header">
    <div class="logo">BLOCKSUBMIT</div>
</div>

<div class="container">
<div class="card">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<select name="role" id="role" required>
    <option value="">Select Role</option>
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
</select>

<input type="text" name="courses" id="courses" placeholder="Enter courses" required>

<button type="submit">Create Account</button>

</form>

{% if msg %}
<p class="msg">{{ msg }}</p>
{% endif %}

</div>
</div>

<script>
document.getElementById("role").addEventListener("change", function() {
    let c = document.getElementById("courses");

    if (this.value === "student") {
        c.placeholder = "Max 6 courses (CS101,CS102...)";
    } else if (this.value === "teacher") {
        c.placeholder = "Max 2 courses (CS101,CS102)";
    }
});
</script>

</body>
</html>
